# Prefix: Ctrl-b (tmux default)

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Faster escape time (vim-friendly)
set -sg escape-time 10

# Enable mouse (scroll, select pane, resize)
set -g mouse on

# 256-color and true-color support
set -g default-terminal "screen-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# Vim-style pane navigation
# Note: 'l' shadows the built-in last-window binding
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "[#S] "
set -g status-right "%H:%M %d-%b"

# Keep SSH agent working across reattach
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY"
